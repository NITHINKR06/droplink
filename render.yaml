services:
  - type: web
    name: droplink
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPLOAD_DIR
        value: /tmp/uploads
    disk:
      name: uploads
      mountPath: /tmp/uploads
      sizeGB: 1
